name: CI

# Quality gate for the project. Adapt the steps below to the language / package
# manager of the project that uses this template.
#
# Defaults assume Node.js + pnpm. For other stacks (Cargo, Python, Go, ...),
# replace the install / typecheck / lint / test / build steps accordingly. The
# overall structure (cheap static gate, then test matrix) is stack-agnostic and
# worth keeping.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref so a fast-forward push doesn't spend
# minutes on stale CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Cheap, single-version gate. Catches typing / lint / format violations before
  # the test matrix spins up.
  static:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TEMPLATE: replace the toolchain setup below for non-Node stacks.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      # Build before typecheck: every package consumes its siblings via
      # workspace dependencies whose `.d.mts` files live under `dist/`.
      # Running `tsc` against an un-built workspace fails to resolve
      # `@word-kit/ooxml-xml` and friends, even though every individual
      # package is locally consistent.
      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Tree-shake budget
        # Verifies @word-kit/core can be tree-shaken: a minimal entry
        # (createDocx + appendParagraph + toUint8Array) stays under a hard
        # bundle-size budget AND doesn't carry strings from feature areas it
        # doesn't import. Regressions like reintroducing a class would make
        # this job fail loudly instead of silently bloating bundles.
        run: pnpm check:tree-shake

  # Multi-version test matrix. Adapt the matrix to the runtimes the project
  # supports. Drop versions that are past their EOL date.
  #
  # Node 20 reached end-of-life in 2026-04, and tsdown's runtime config
  # loader (the `unrun` helper) no longer resolves under it. We test on
  # the two current LTS lines only.
  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: static
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    steps:
      # references/* (mammoth.js, python-docx, …) are git submodules carrying
      # real Word .docx fixtures used by the fixture-coverage and
      # fixture-python-docx tests. Checkout must pull them.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
